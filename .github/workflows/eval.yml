name: EvalForge Regression Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  regression-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('EvalForge/requirements.txt') }}

      - name: Install dependencies
        working-directory: EvalForge
        run: pip install -r requirements.txt

      - name: Run regression tests
        working-directory: EvalForge
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MOCK_MODE: "false"
          PROVIDER: "groq"
          BASELINE_RUN_ID: ${{ secrets.BASELINE_RUN_ID }}
          MAX_CONCURRENT_CALLS: "1"
          JUDGE_TEMPERATURE: "0.0"
        run: python run_regression.py

      - name: Commit dashboard data
        if: always()
        working-directory: EvalForge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${{ github.head_ref || github.ref_name }}
          git add docs/dashboard_data.json
          git diff --staged --quiet || git commit -m "chore: update dashboard data [skip ci]"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}